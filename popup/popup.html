<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tranquil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup" id="popup-root">
    <header class="header">
      <div class="status-area">
        <span id="status-dot" class="status-dot status-dot--active" aria-hidden="true"></span>
        <div class="header-text">
          <h1 class="title" id="title">Tranquil</h1>
          <p id="active-site" class="active-site-inline" aria-live="polite" aria-label="Active site"></p>
        </div>
      </div>
      <div class="header-actions">
        <button type="button" id="theme-toggle" class="header-icon-btn" title="Toggle light/dark mode" aria-label="Toggle theme">
          <svg id="theme-icon-sun" class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg id="theme-icon-moon" class="theme-icon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <a href="#" id="options-link" class="header-settings" title="Options" aria-label="Options">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </a>
      </div>
    </header>

    <section class="pause-section" id="pause-section">
      <div id="pause-block" class="pause-block">
        <button type="button" id="pause-btn" class="pause-btn">
          <span class="pause-btn-text">Hold 3s to pause</span>
          <span id="pause-friction" class="pause-friction hidden"></span>
        </button>
        <p class="pause-hint">Prevents impulse unpause.</p>
      </div>
      <div id="pause-countdown" class="pause-countdown hidden">
        <div class="countdown-ring">
          <span id="pause-timer" class="pause-timer">0:00</span>
        </div>
        <button type="button" id="resume-now-btn" class="resume-now-btn">Resume Now</button>
      </div>
    </section>

    <section class="master-section">
      <label class="toggle-row toggle-row--master">
        <span class="toggle-label">Tranquil on</span>
        <input type="checkbox" id="master-toggle" class="toggle" checked>
      </label>
    </section>

    <section class="mode-section">
      <label class="mode-label" for="mode-select">Mode</label>
      <select id="mode-select" class="mode-select">
        <option value="custom">Custom</option>
        <option value="work">Work (all hidden)</option>
        <option value="social">Social (DMs ok)</option>
      </select>
      <p id="mode-preset-desc" class="mode-preset-desc"></p>
    </section>

    <section class="global-section">
      <label class="toggle-row">
        <span class="toggle-label">Quiet title</span>
        <input type="checkbox" id="quiet-title-toggle" class="toggle">
      </label>
      <p class="hint">Strip (3) from tab title.</p>
    </section>

    <section class="sites-section">
      <h2 class="sites-title">Sites</h2>
      <div id="sites-list" class="sites-list"></div>
    </section>

    <footer class="footer">
      <a href="#" id="manage-zaps-link" class="footer-link">Manage Zaps</a>
      <span id="time-saved" class="time-saved"></span>
      <a href="#" id="github-link" class="footer-github" title="Open source on GitHub">
        <svg class="github-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        <span>Open source</span>
      </a>
      <a href="#" id="kofi-link" class="footer-kofi" title="Support on Ko-fi">
        <span class="kofi-heart" aria-hidden="true">♥</span>
        <span>Ko-fi</span>
      </a>
      <span class="privacy">Local only · No server</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
