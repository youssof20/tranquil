<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Breathe – Tranquil</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
    .circle { width: 120px; height: 120px; border-radius: 50%; background: rgba(59, 130, 246, 0.4); animation: breathe 4s ease-in-out infinite; }
    @keyframes breathe { 0%, 100% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } }
    p { margin-top: 24px; font-size: 1rem; }
  </style>
</head>
<body>
  <div>
    <div class="circle" id="circle"></div>
    <p>Take a breath...</p>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const redirect = params.get('redirect');
    const duration = 3000;
    setTimeout(() => {
      if (redirect) try { location.href = decodeURIComponent(redirect); } catch (e) { location.href = 'https://www.youtube.com'; }
    }, duration);
  </script>
</body>
</html>
